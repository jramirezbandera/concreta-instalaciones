name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch: # permite lanzarlo a mano desde la pestaña Actions

# Permisos mínimos para publicar en Pages vía artefacto + OIDC.
permissions:
  contents: read
  pages: write
  id-token: write

# Un despliegue a la vez; no cancelar uno en curso (deja terminar el deploy).
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build (tsc -b && vite build)
        run: bun run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
